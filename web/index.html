<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>The Garden</title>
    <style id="expo-reset">
      html, body { height: 100%; margin: 0; padding: 0; }
      body { overflow: hidden; background: #131820; }
      #root { display: flex; height: 100%; flex: 1; }
      #debug {
        position: fixed; top: 0; left: 0; right: 0;
        background: #c00; color: #fff;
        font-family: monospace; font-size: 13px;
        padding: 8px; z-index: 9999;
        display: none; white-space: pre-wrap; word-break: break-all;
      }
    </style>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('debug');
        if (el) { el.style.display = 'block'; el.textContent = 'JS ERROR: ' + msg + '\n' + (src||'') + ':' + line; }
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('debug');
        if (el) { el.style.display = 'block'; el.textContent = 'UNHANDLED: ' + (e.reason||e); }
      });
    </script>
  </head>
  <body>
    <div id="debug"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <%BUNDLE%>
  </body>
</html>
